<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking Receipt</title>

<link href="https://fonts.googleapis.com/css2?family=Domine&display=swap" rel="stylesheet">

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: linear-gradient(135deg, #dfead9, #c8d8c0);

  display: flex;
  justify-content: center;
  align-items: flex-start; /* ⬅️ important */

  padding: 40px 0; /* ⬅️ adds top & bottom space */
  min-height: 100vh;
}
body::before {
  content: "";
  position: fixed;
  top: -100px;
  right: -100px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(67,160,71,0.25), transparent);
  z-index: -1;
}
body::after {
  content: "";
  position: fixed;
  bottom: -120px;
  left: -120px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(27,94,32,0.2), transparent);
  z-index: -1;
}
.receipt {
  background: #ffffff;
  width: 430px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.15);
  overflow: hidden;
  display: none;
  flex-direction: column;
  margin: 20px 0; /* ⬅️ extra breathing room */
}
.header {
  background: linear-gradient(135deg, #114500, #1f6b1f);
  color: white;
  text-align: center;
  padding: 25px 20px;
}
.header h2 {
  margin: 5px 0;
}
.header small {
  opacity: 0.8;
}
.logo {
  width: 70px;
  height: 70px;
  object-fit: contain;
  background: #fff;
  border-radius: 50%;
  padding: 6px;
  margin-bottom: 10px;
}
.content {
  padding: 25px 30px; /* mas premium spacing */
  color: #2b2b2b;
}
h2 {
  text-align: center;
  margin-bottom: 5px;
}
.subtitle {
  text-align: center;
  font-size: 13px;
  color: #777;
  margin-bottom: 15px;
}
.section {
  margin-bottom: 18px;
}

.section-title {
  font-size: 12px;
  font-weight: 700;
  color: #114500;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.line {
  border-top: 1px dashed #ccc;
  margin: 15px 0;
}
.details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  font-size: 13px;
  gap: 6px 10px;
}
.details p {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 10px 12px;
  margin: 6px 0;

  background: #f9fbf8;
  border-radius: 8px;

  font-size: 13.5px;
  border: 1px solid #eef3ec;
}
.details p::first-line {
  font-weight: 600;
  color: #114500;
}
.details p::before {
  content: attr(data-label);
  font-weight: 600;
  color: #114500;
}
.details p {
  position: relative;
  font-size: 14px;
}


.details strong {
  font-weight: 500;
  color: #888;
}

.details span {
  font-weight: 600;
  text-align: right;
}
#total {
  background: #f3f7f2;
  border-radius: 12px;
  padding: 15px;
  font-size: 14px;
}
#total p {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
}

#total p:last-child {
  font-size: 15px;
  font-weight: bold;
  color: #114500;
}

/* QR SMALL */
#qrImg {
    width: 90px;
    height: 90px;
}
.qr {
  text-align: center;
  margin-top: 10px;
}
#qrImg {
  width: 75px;
  margin: 10px 0;
}
button {
  margin-top: 10px;
  background: linear-gradient(135deg, #114500, #2d7a2d);
  color: white;
  border: none;
  padding: 13px;
  border-radius: 30px;
  cursor: pointer;
  width: 100%;
  font-weight: 600;
  letter-spacing: 0.3px;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 18px rgba(0,0,0,0.2);
}

.footer {
  text-align: center;
  padding: 15px 20px 20px;
}

.footer p {
  margin: 5px 0;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="receipt" id="receipt">

  <div class="header">
    <img src="IMAGES/Cafebella.jpg" class="logo">
    <h2>Booking Receipt</h2>
    <small id="dateNow"></small>
  </div>

  <div class="content">
    <div id="details"></div>

    <div class="line"></div>

    <div id="total"></div>
  </div>

  <div class="footer">
    <p>Thank you for booking! 🎉</p>
    <img id="qrImg">
    <button onclick="downloadPDF()">⬇ Download Receipt</button>
  </div>

</div>

<script>

// ✅ AUTO GENERATE REFERENCE
function generateReference() {
    return 'REF-' + Math.random().toString(36).substr(2, 9).toUpperCase();
}

// SHOW RECEIPT
function showReceipt(data) {

    const receipt = document.getElementById("receipt");
    const details = document.getElementById("details");

    // AUTO REF IF NONE
    if (!data.reference) {
        data.reference = generateReference();
    }

details.innerHTML = "";

if (data.fullname) details.innerHTML += `<p>Full Name: ${data.fullname}</p>`;
if (data.contact) details.innerHTML += `<p>Contact Number: ${data.contact}</p>`;
if (data.service) details.innerHTML += `<p>Service: ${data.service}</p>`;
if (data.guests) details.innerHTML += `<p>Number of Guests: ${data.guests}</p>`;
if (data.location) details.innerHTML += `<p>Location: ${data.location}</p>`;
if (data.paymentMethod) details.innerHTML += `<p>Mode of Payment: ${data.paymentMethod}</p>`;

if (data.paymentType) {
    const typeText = data.paymentType === "full"
        ? "Full Payment"
        : "Reservation Only";
    details.innerHTML += `<p>Payment Type: ${typeText}</p>`;
}

details.innerHTML += `<p>Reference Number: ${data.reference}</p>`;

document.getElementById("total").innerHTML = `
    <p>Full Package Price: ₱${data.fullPrice.toLocaleString()}</p>
    <p>Amount Paid: ₱${data.amountPaid.toLocaleString()}</p>
    <p>Remaining Balance: ₱${data.remainingBalance.toLocaleString()}</p>
`;

   document.getElementById("qrImg").src =
`https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://www.facebook.com/share/1CiwKkiCkY/`;
    receipt.style.display = "flex";
}

// ✅ REAL PDF DOWNLOAD
function downloadPDF() {
    const element = document.getElementById("receipt");

    html2pdf().from(element).save("CafeBella_Receipt.pdf");
}
const receiptData = JSON.parse(localStorage.getItem("receiptData"));

if (receiptData) {
    showReceipt(receiptData);
} else {
    document.getElementById("receipt").innerHTML = "<p style='text-align:center;'>No booking data found.</p>";
    document.getElementById("receipt").style.display = "flex";
}
</script>

</body>
</html>
